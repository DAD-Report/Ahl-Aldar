<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>مجلة أهل الدار | كتاب تفاعلي</title>
  <meta name="description" content="Interactive Arabic book-style flipbook for مجلة أهل الدار." />
  <style>
    :root {
      --bg-1: #07263a;
      --bg-2: #0a405a;
      --bg-3: #0f7a78;
      --paper: #ffffff;
      --paper-edge: #f3f1ea;
      --panel: rgba(8, 32, 48, .58);
      --panel-border: rgba(255,255,255,.16);
      --text-soft: rgba(255,255,255,.88);
      --spread-ratio: 2382 / 1684;
      --turn-time: 1320ms;
      --ease-book: cubic-bezier(.2,.75,.08,1);
      --zoom: 1;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, Arial, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 18% 12%, rgba(255,255,255,.10), transparent 18rem),
        radial-gradient(circle at 84% 14%, rgba(0,155,138,.18), transparent 18rem),
        linear-gradient(140deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: .14rem;
      padding: .12rem .18rem .24rem;
    }

    .topbar {
      min-height: 22px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding-inline: .3rem;
      overflow: hidden;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: .42rem;
      flex-wrap: wrap;
      justify-content: flex-end;
      text-align: right;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(.92rem, 1.55vw, 1.28rem);
      font-weight: 800;
      letter-spacing: -.02em;
      line-height: 1;
    }

    .brand span {
      font-size: clamp(.68rem, .8vw, .82rem);
      color: rgba(255,255,255,.82);
      line-height: 1;
    }

    .reader {
      position: relative;
      min-height: 0;
      display: grid;
      place-items: center;
      perspective: 3000px;
      overflow: hidden;
    }

    .book-scale {
      transform: scale(var(--zoom));
      transform-origin: center center;
      transition: transform 220ms ease;
      width: min(99.5vw, calc((100vh - 58px) * 1.414));
      max-width: 1580px;
      min-width: min(920px, 99vw);
    }

    .book-frame {
      position: relative;
      width: 100%;
      aspect-ratio: var(--spread-ratio);
      border-radius: 14px;
      background: linear-gradient(180deg, #fbfbfb 0%, #f0f0f0 100%);
      box-shadow:
        0 24px 50px rgba(0,0,0,.22),
        0 8px 22px rgba(0,0,0,.12),
        inset 0 0 0 1px rgba(255,255,255,.35);
      overflow: hidden;
      isolation: isolate;
    }

    .book-frame::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.20), rgba(255,255,255,0));
      pointer-events: none;
      z-index: 9;
    }

    .book-frame::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 20px;
      transform: translateX(-50%);
      background:
        linear-gradient(90deg,
          rgba(0,0,0,.12) 0%,
          rgba(255,255,255,.44) 48%,
          rgba(0,0,0,.14) 100%);
      opacity: .48;
      pointer-events: none;
      z-index: 8;
      mix-blend-mode: multiply;
    }

    .book-shadow {
      position: absolute;
      inset: auto 2.5% -10px 2.5%;
      height: 34px;
      background: rgba(0,0,0,.25);
      filter: blur(18px);
      border-radius: 999px;
      z-index: -1;
    }

    .spread-stage {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: var(--paper-edge);
    }

    .spread {
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: rotateY(0deg);
      transform-origin: right center;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      pointer-events: none;
      visibility: hidden;
    }

    .spread img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: var(--paper);
      user-select: none;
      -webkit-user-drag: none;
      backface-visibility: hidden;
    }

    .spread.active {
      opacity: 1;
      visibility: visible;
      z-index: 3;
    }

    .spread.animating {
      opacity: 1;
      visibility: visible;
      z-index: 5;
    }

    .spread.next-start { transform-origin: right center; transform: rotateY(92deg); opacity: .22; }
    .spread.next-enter { transform-origin: right center; transform: rotateY(0deg); opacity: 1; transition: transform var(--turn-time) var(--ease-book), opacity 420ms ease; }
    .spread.next-exit { transform-origin: right center; transform: rotateY(-92deg); opacity: .18; transition: transform var(--turn-time) var(--ease-book), opacity 380ms ease; }

    .spread.prev-start { transform-origin: left center; transform: rotateY(-92deg); opacity: .22; }
    .spread.prev-enter { transform-origin: left center; transform: rotateY(0deg); opacity: 1; transition: transform var(--turn-time) var(--ease-book), opacity 420ms ease; }
    .spread.prev-exit { transform-origin: left center; transform: rotateY(92deg); opacity: .18; transition: transform var(--turn-time) var(--ease-book), opacity 380ms ease; }

    .hotspot {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 44%;
      z-index: 7;
      background: transparent;
      border: 0;
      cursor: pointer;
    }

    .hotspot.next { left: 0; }
    .hotspot.prev { right: 0; }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 12;
      width: clamp(42px, 4vw, 56px);
      height: clamp(42px, 4vw, 56px);
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.26);
      background: rgba(255,255,255,.12);
      color: #fff;
      display: grid;
      place-items: center;
      box-shadow: 0 14px 36px rgba(0,0,0,.22);
      backdrop-filter: blur(12px);
      cursor: pointer;
      font-size: clamp(1.3rem, 2.4vw, 1.9rem);
      transition: transform .22s ease, background .22s ease, opacity .22s ease;
      user-select: none;
    }

    .nav-btn:hover { transform: translateY(-50%) scale(1.04); background: rgba(255,255,255,.18); }
    .nav-btn:active { transform: translateY(-50%) scale(.98); }
    .nav-btn:disabled { opacity: .34; cursor: not-allowed; }
    .nav-next { left: .18rem; }
    .nav-prev { right: .18rem; }

    .controls {
      width: min(99.4vw, 1380px);
      margin-inline: auto;
      display: grid;
      grid-template-columns: auto auto auto 1fr auto;
      align-items: center;
      gap: .42rem;
      padding: .34rem .48rem;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      box-shadow: 0 12px 28px rgba(0,0,0,.16);
      backdrop-filter: blur(12px);
      direction: ltr;
    }

    .control-btn {
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.10);
      color: #fff;
      border-radius: 999px;
      padding: .46rem .8rem;
      min-width: 42px;
      font-size: .95rem;
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
      transition: transform .18s ease, background .18s ease;
    }

    .control-btn:hover { background: rgba(255,255,255,.18); transform: translateY(-1px); }
    .control-btn:active { transform: translateY(0); }

    .progress {
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .progress-track {
      position: relative;
      flex: 1;
      height: 9px;
      border-radius: 999px;
      background: rgba(255,255,255,.18);
      overflow: hidden;
      cursor: pointer;
    }

    .progress-bar {
      position: absolute;
      inset-block: 0;
      left: 0;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ffffff, #8fffe8);
      transition: width 260ms ease;
    }

    .counter {
      min-width: 122px;
      text-align: center;
      color: var(--text-soft);
      font-weight: 800;
      font-size: .98rem;
      direction: ltr;
    }

    .loading {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, var(--bg-1), var(--bg-3));
      z-index: 100;
      transition: opacity .35s ease, visibility .35s ease;
    }

    .loading.hidden { opacity: 0; visibility: hidden; }

    .loading-dot {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: #fff;
      box-shadow: -25px 0 0 rgba(255,255,255,.44), 25px 0 0 rgba(255,255,255,.72);
      animation: pulse 1s infinite ease-in-out;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(.82); opacity: .78; }
    }

    @media (max-width: 980px) {
      .book-scale {
        width: 99.6vw;
        min-width: 0;
      }
      .controls {
        grid-template-columns: auto auto 1fr auto;
      }
      .fullscreen-btn { display: none; }
    }

    @media (max-width: 720px) {
      .app { padding: .22rem; }
      .topbar { justify-content: center; }
      .brand { justify-content: center; text-align: center; }
      .brand h1 { font-size: 1rem; }
      .brand span { font-size: .72rem; }
      .reader { align-items: start; }
      .book-scale { width: 99.6vw; margin-top: 0; }
      .nav-btn { top: auto; bottom: 4.2rem; transform: none; width: 42px; height: 42px; }
      .nav-btn:hover, .nav-btn:active { transform: none; }
      .controls {
        width: calc(100vw - .2rem);
        grid-template-columns: auto auto 1fr auto;
        gap: .4rem;
        padding: .44rem .52rem;
      }
      .control-btn { padding: .42rem .66rem; }
      .counter { min-width: 96px; font-size: .92rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      :root { --turn-time: 1ms; }
      *, *::before, *::after { animation-duration: 1ms !important; transition-duration: 1ms !important; scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading" aria-hidden="true">
    <div class="loading-dot"></div>
  </div>

  <div class="app" id="app">
    <header class="topbar">
      <div class="brand">
        <h1>مجلة أهل الدار</h1>
        <span>نبض واحد رؤية واحدة</span>
      </div>
    </header>

    <main class="reader" aria-label="Arabic flipbook reader">
      <button class="nav-btn nav-prev" id="prevBtn" type="button" aria-label="Previous spread" title="Previous spread">›</button>
      <div class="book-scale" id="bookScale">
        <section class="book-frame" id="bookFrame">
          <div class="book-shadow"></div>
          <div class="spread-stage" id="spreadStage"></div>
          <button class="hotspot next" id="nextHotspot" aria-label="Next spread" type="button"></button>
          <button class="hotspot prev" id="prevHotspot" aria-label="Previous spread" type="button"></button>
        </section>
      </div>
      <button class="nav-btn nav-next" id="nextBtn" type="button" aria-label="Next spread" title="Next spread">‹</button>
    </main>

    <footer class="controls">
      <button class="control-btn" id="zoomOutBtn" type="button" aria-label="Zoom out">−</button>
      <button class="control-btn" id="zoomInBtn" type="button" aria-label="Zoom in">＋</button>
      <button class="control-btn fullscreen-btn" id="fullscreenBtn" type="button">Fullscreen</button>
      <div class="progress">
        <div class="progress-track" id="progressTrack" role="slider" aria-label="Page progress" aria-valuemin="1" aria-valuemax="32" aria-valuenow="1" tabindex="0">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>
      <div class="counter" id="counter">1–2 / 32</div>
    </footer>
  </div>

  <script>
    const TOTAL_PAGES = 32;
    const TOTAL_SPREADS = 16;
    const SPREAD_PATH = n => `assets/spreads/spread-${String(n).padStart(2, '0')}.jpg`;

    const loading = document.getElementById('loading');
    const stage = document.getElementById('spreadStage');
    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextHotspot = document.getElementById('nextHotspot');
    const prevHotspot = document.getElementById('prevHotspot');
    const progressTrack = document.getElementById('progressTrack');
    const progressBar = document.getElementById('progressBar');
    const counter = document.getElementById('counter');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const zoomInBtn = document.getElementById('zoomInBtn');
    const zoomOutBtn = document.getElementById('zoomOutBtn');
    const root = document.documentElement;

    let currentSpread = 1;
    let animating = false;
    let zoom = 1.14;
    const spreads = [];

    function createSpreads() {
      for (let i = 1; i <= TOTAL_SPREADS; i++) {
        const article = document.createElement('article');
        article.className = 'spread';
        article.dataset.index = i;
        const img = document.createElement('img');
        img.src = SPREAD_PATH(i);
        img.alt = `Spread ${i} of مجلة أهل الدار`;
        img.decoding = 'async';
        img.loading = i <= 2 ? 'eager' : 'lazy';
        article.appendChild(img);
        stage.appendChild(article);
        spreads.push(article);
      }
      spreads[0].classList.add('active');
    }

    function spreadPageRange(index) {
      const start = index * 2 - 1;
      const end = Math.min(index * 2, TOTAL_PAGES);
      return `${start}–${end} / ${TOTAL_PAGES}`;
    }

    function progressPage(index) {
      return index * 2 - 1;
    }

    function updateUI() {
      counter.textContent = spreadPageRange(currentSpread);
      const pageNo = progressPage(currentSpread);
      progressTrack.setAttribute('aria-valuenow', pageNo);
      progressBar.style.width = `${((pageNo - 1) / (TOTAL_PAGES - 1)) * 100}%`;
      prevBtn.disabled = animating || currentSpread === 1;
      nextBtn.disabled = animating || currentSpread === TOTAL_SPREADS;
    }

    function cleanClasses(el) {
      el.classList.remove('active', 'animating', 'next-start', 'next-enter', 'next-exit', 'prev-start', 'prev-enter', 'prev-exit');
      el.style.zIndex = '';
    }

    function goNext() {
      if (animating || currentSpread >= TOTAL_SPREADS) return;
      const current = spreads[currentSpread - 1];
      const next = spreads[currentSpread];
      animating = true;
      updateUI();

      next.classList.add('animating', 'next-start');
      next.style.zIndex = '4';
      current.classList.add('animating');
      current.style.zIndex = '5';

      requestAnimationFrame(() => {
        current.classList.add('next-exit');
        next.classList.add('next-enter');
      });

      window.setTimeout(() => {
        cleanClasses(current);
        cleanClasses(next);
        next.classList.add('active');
        currentSpread += 1;
        animating = false;
        updateUI();
      }, 1340);
    }

    function goPrev() {
      if (animating || currentSpread <= 1) return;
      const current = spreads[currentSpread - 1];
      const prev = spreads[currentSpread - 2];
      animating = true;
      updateUI();

      prev.classList.add('animating', 'prev-start');
      prev.style.zIndex = '5';
      current.classList.add('animating');
      current.style.zIndex = '4';

      requestAnimationFrame(() => {
        current.classList.add('prev-exit');
        prev.classList.add('prev-enter');
      });

      window.setTimeout(() => {
        cleanClasses(current);
        cleanClasses(prev);
        prev.classList.add('active');
        currentSpread -= 1;
        animating = false;
        updateUI();
      }, 1340);
    }

    function jumpToSpread(targetSpread) {
      const clamped = Math.max(1, Math.min(TOTAL_SPREADS, targetSpread));
      if (clamped === currentSpread || animating) return;
      spreads.forEach(cleanClasses);
      spreads[clamped - 1].classList.add('active');
      currentSpread = clamped;
      animating = false;
      updateUI();
    }

    function spreadFromPointer(clientX) {
      const rect = progressTrack.getBoundingClientRect();
      const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
      const pageNo = Math.round(1 + ratio * (TOTAL_PAGES - 1));
      return Math.min(TOTAL_SPREADS, Math.max(1, Math.ceil(pageNo / 2)));
    }

    function applyZoom() {
      zoom = Math.max(1.0, Math.min(1.42, zoom));
      root.style.setProperty('--zoom', zoom.toFixed(2));
    }

    nextBtn.addEventListener('click', goNext);
    prevBtn.addEventListener('click', goPrev);
    nextHotspot.addEventListener('click', goNext);
    prevHotspot.addEventListener('click', goPrev);

    progressTrack.addEventListener('click', e => jumpToSpread(spreadFromPointer(e.clientX)));
    progressTrack.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') { e.preventDefault(); goNext(); }
      if (e.key === 'ArrowRight') { e.preventDefault(); goPrev(); }
      if (e.key === 'Home') { e.preventDefault(); jumpToSpread(1); }
      if (e.key === 'End') { e.preventDefault(); jumpToSpread(TOTAL_SPREADS); }
    });

    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); goNext(); }
      if (e.key === 'ArrowRight' || e.key === 'PageUp') { e.preventDefault(); goPrev(); }
      if (e.key === 'Home') { e.preventDefault(); jumpToSpread(1); }
      if (e.key === 'End') { e.preventDefault(); jumpToSpread(TOTAL_SPREADS); }
      if (e.key === '+') { zoom += .06; applyZoom(); }
      if (e.key === '-') { zoom -= .06; applyZoom(); }
    });

    let touchStartX = 0;
    let touchStartY = 0;
    stage.addEventListener('touchstart', e => {
      if (!e.changedTouches.length) return;
      touchStartX = e.changedTouches[0].clientX;
      touchStartY = e.changedTouches[0].clientY;
    }, { passive: true });

    stage.addEventListener('touchend', e => {
      if (!e.changedTouches.length) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy) * 1.3) {
        if (dx < 0) goNext();
        else goPrev();
      }
    }, { passive: true });

    zoomInBtn.addEventListener('click', () => { zoom += .06; applyZoom(); });
    zoomOutBtn.addEventListener('click', () => { zoom -= .06; applyZoom(); });

    fullscreenBtn.addEventListener('click', async () => {
      if (!document.fullscreenElement) {
        try { await document.documentElement.requestFullscreen(); } catch (_) {}
      } else {
        try { await document.exitFullscreen(); } catch (_) {}
      }
    });

    window.addEventListener('load', () => {
      createSpreads();
      applyZoom();
      updateUI();
      window.setTimeout(() => loading.classList.add('hidden'), 250);
    });
  </script>
</body>
</html>
