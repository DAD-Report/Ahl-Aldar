<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>مجلة أهل الدار | كتاب تفاعلي</title>
  <meta name="description" content="Interactive Arabic real-book style flipbook for مجلة أهل الدار." />
  <style>
    :root {
      --bg-1: #07263a;
      --bg-2: #0a405a;
      --bg-3: #0f7a78;
      --paper: #ffffff;
      --paper-edge: #f3f1ea;
      --panel: rgba(8, 32, 48, .58);
      --panel-border: rgba(255,255,255,.16);
      --text-soft: rgba(255,255,255,.88);
      --spread-ratio: 2382 / 1684;
      --turn-time: 1320ms;
      --ease-book: cubic-bezier(.18,.78,.08,1);
      --zoom: 1.14;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, Arial, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 18% 12%, rgba(255,255,255,.10), transparent 18rem),
        radial-gradient(circle at 84% 14%, rgba(0,155,138,.18), transparent 18rem),
        linear-gradient(140deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: .14rem;
      padding: .12rem .18rem .24rem;
    }

    .topbar {
      min-height: 22px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding-inline: .25rem;
      overflow: hidden;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: .45rem;
      flex-wrap: wrap;
      justify-content: flex-end;
      text-align: right;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(.92rem, 1.55vw, 1.28rem);
      font-weight: 800;
      letter-spacing: -.02em;
      line-height: 1;
    }

    .brand span {
      font-size: clamp(.68rem, .8vw, .82rem);
      color: rgba(255,255,255,.82);
      line-height: 1;
    }

    .reader {
      position: relative;
      min-height: 0;
      display: grid;
      place-items: center;
      perspective: 3000px;
      overflow: hidden;
    }

    .book-scale {
      transform: scale(var(--zoom));
      transform-origin: center center;
      transition: transform 220ms ease;
      width: min(99.5vw, calc((100vh - 58px) * 1.414));
      max-width: 1580px;
      min-width: min(920px, 99vw);
    }

    .book-frame {
      position: relative;
      width: 100%;
      aspect-ratio: var(--spread-ratio);
      border-radius: 14px;
      background: linear-gradient(180deg, #fbfbfb 0%, #f0f0f0 100%);
      box-shadow:
        0 24px 50px rgba(0,0,0,.22),
        0 8px 22px rgba(0,0,0,.12),
        inset 0 0 0 1px rgba(255,255,255,.35);
      overflow: hidden;
      isolation: isolate;
    }

    .book-shadow {
      position: absolute;
      inset: auto 2.5% -10px 2.5%;
      height: 34px;
      background: rgba(0,0,0,.25);
      filter: blur(18px);
      border-radius: 999px;
      z-index: -1;
    }

    .book-frame::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,0));
      pointer-events: none;
      z-index: 20;
    }

    .book-frame::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 26px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, rgba(0,0,0,.16), rgba(255,255,255,.42) 48%, rgba(0,0,0,.15));
      opacity: .46;
      pointer-events: none;
      mix-blend-mode: multiply;
      z-index: 21;
    }

    .page {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      overflow: hidden;
      background: var(--paper);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.03);
      z-index: 2;
    }

    .page img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: var(--paper);
      user-select: none;
      -webkit-user-drag: none;
    }

    .page-left {
      left: 0;
      box-shadow: inset -14px 0 24px rgba(0,0,0,.07), inset 0 0 0 1px rgba(0,0,0,.03);
    }

    .page-right {
      right: 0;
      box-shadow: inset 14px 0 24px rgba(0,0,0,.07), inset 0 0 0 1px rgba(0,0,0,.03);
    }

    .turn-sheet {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      pointer-events: none;
      display: none;
      z-index: 12;
      filter: drop-shadow(0 10px 16px rgba(0,0,0,.16));
    }

    .turn-sheet.active { display: block; }
    .turn-sheet.next { left: 0; transform-origin: right center; transform: rotateY(0deg); }
    .turn-sheet.prev { right: 0; transform-origin: left center; transform: rotateY(0deg); }
    .turn-sheet.next.turning { transition: transform var(--turn-time) var(--ease-book); transform: rotateY(-180deg); }
    .turn-sheet.prev.turning { transition: transform var(--turn-time) var(--ease-book); transform: rotateY(180deg); }

    .turn-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      overflow: hidden;
      background: var(--paper);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.03);
    }

    .turn-face img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: var(--paper);
      user-select: none;
      -webkit-user-drag: none;
    }

    .turn-face.front::after,
    .turn-face.back::after,
    .page-left::after,
    .page-right::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .page-left::after,
    .turn-sheet.next .front::after {
      background: linear-gradient(90deg, rgba(255,255,255,.16), transparent 22%, transparent 84%, rgba(0,0,0,.10));
    }

    .page-right::after,
    .turn-sheet.prev .front::after {
      background: linear-gradient(90deg, rgba(0,0,0,.10), transparent 16%, transparent 78%, rgba(255,255,255,.14));
    }

    .turn-sheet.next .back::after,
    .turn-sheet.prev .back::after {
      background: linear-gradient(90deg, rgba(0,0,0,.08), transparent 18%, transparent 82%, rgba(255,255,255,.12));
    }

    .turn-face.back { transform: rotateY(180deg); }

    .hotspot {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 44%;
      z-index: 18;
      background: transparent;
      border: 0;
      cursor: pointer;
    }
    .hotspot.next { left: 0; }
    .hotspot.prev { right: 0; }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 24;
      width: clamp(42px, 4vw, 56px);
      height: clamp(42px, 4vw, 56px);
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.26);
      background: rgba(255,255,255,.12);
      color: #fff;
      display: grid;
      place-items: center;
      box-shadow: 0 14px 36px rgba(0,0,0,.22);
      backdrop-filter: blur(12px);
      cursor: pointer;
      font-size: clamp(1.3rem, 2.4vw, 1.9rem);
      transition: transform .22s ease, background .22s ease, opacity .22s ease;
      user-select: none;
    }

    .nav-btn:hover { transform: translateY(-50%) scale(1.04); background: rgba(255,255,255,.18); }
    .nav-btn:active { transform: translateY(-50%) scale(.98); }
    .nav-btn:disabled { opacity: .34; cursor: not-allowed; }
    .nav-next { left: .18rem; }
    .nav-prev { right: .18rem; }

    .controls {
      width: min(99.4vw, 1380px);
      margin-inline: auto;
      display: grid;
      grid-template-columns: auto auto auto 1fr auto;
      align-items: center;
      gap: .42rem;
      padding: .34rem .48rem;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      box-shadow: 0 12px 28px rgba(0,0,0,.16);
      backdrop-filter: blur(12px);
      direction: ltr;
    }

    .control-btn {
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.10);
      color: #fff;
      border-radius: 999px;
      padding: .46rem .8rem;
      min-width: 42px;
      font-size: .95rem;
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
      transition: transform .18s ease, background .18s ease;
    }
    .control-btn:hover { background: rgba(255,255,255,.18); transform: translateY(-1px); }
    .control-btn:active { transform: translateY(0); }

    .progress { display: flex; align-items: center; min-width: 0; }
    .progress-track {
      position: relative;
      flex: 1;
      height: 9px;
      border-radius: 999px;
      background: rgba(255,255,255,.18);
      overflow: hidden;
      cursor: pointer;
    }
    .progress-bar {
      position: absolute;
      inset-block: 0;
      left: 0;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ffffff, #8fffe8);
      transition: width 260ms ease;
    }

    .counter {
      min-width: 122px;
      text-align: center;
      color: var(--text-soft);
      font-weight: 800;
      font-size: .98rem;
      direction: ltr;
    }

    .loading {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, var(--bg-1), var(--bg-3));
      z-index: 100;
      transition: opacity .35s ease, visibility .35s ease;
    }
    .loading.hidden { opacity: 0; visibility: hidden; }
    .loading-dot {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: #fff;
      box-shadow: -25px 0 0 rgba(255,255,255,.44), 25px 0 0 rgba(255,255,255,.72);
      animation: pulse 1s infinite ease-in-out;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(.82); opacity: .78; }
    }



    /* Closed-book opening scene */
    .closed-book {
      position: absolute;
      inset: 0;
      z-index: 60;
      display: grid;
      place-items: center;
      perspective: 2600px;
      cursor: pointer;
      border: 0;
      padding: 0;
      margin: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      transition: opacity 520ms ease, visibility 520ms ease;
    }

    .closed-book::before {
      content: "";
      position: absolute;
      width: min(49vw, calc((100vh - 58px) * .72));
      max-width: 650px;
      min-width: min(430px, 86vw);
      aspect-ratio: 1191 / 1684;
      border-radius: 18px;
      background: rgba(0,0,0,.28);
      filter: blur(22px);
      transform: translate(12px, 16px);
      z-index: -1;
    }

    .closed-cover-wrap {
      position: relative;
      width: min(48vw, calc((100vh - 58px) * .70));
      max-width: 640px;
      min-width: min(420px, 84vw);
      aspect-ratio: 1191 / 1684;
      transform-style: preserve-3d;
    }

    .closed-cover {
      position: absolute;
      inset: 0;
      transform-origin: right center;
      transform-style: preserve-3d;
      border-radius: 14px 22px 22px 14px;
      overflow: hidden;
      background: #fff;
      box-shadow:
        0 24px 54px rgba(0,0,0,.28),
        10px 0 24px rgba(0,0,0,.18),
        inset -12px 0 24px rgba(0,0,0,.12),
        inset 2px 0 0 rgba(255,255,255,.35);
      transition: transform 1450ms var(--ease-book), opacity 620ms ease, filter 620ms ease;
      will-change: transform;
    }

    .closed-cover img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      user-select: none;
      -webkit-user-drag: none;
      backface-visibility: hidden;
    }

    .closed-cover::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255,255,255,.12), transparent 22%, transparent 74%, rgba(0,0,0,.18)),
        linear-gradient(180deg, rgba(255,255,255,.16), transparent 40%);
      mix-blend-mode: multiply;
    }

    .closed-book-hint {
      position: absolute;
      bottom: -2.65rem;
      left: 50%;
      transform: translateX(-50%);
      padding: .5rem .9rem;
      border-radius: 999px;
      background: rgba(8,32,48,.58);
      border: 1px solid rgba(255,255,255,.16);
      color: rgba(255,255,255,.92);
      font-size: .9rem;
      font-weight: 700;
      white-space: nowrap;
      backdrop-filter: blur(12px);
      opacity: .92;
    }

    .app.closed .book-scale,
    .app.closed .nav-btn,
    .app.closed .controls {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .app.opening .book-scale,
    .app.opened .book-scale,
    .app.opening .nav-btn,
    .app.opened .nav-btn,
    .app.opening .controls,
    .app.opened .controls {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .app.opening .book-scale {
      animation: bookAppear 1300ms var(--ease-book) both;
    }

    @keyframes bookAppear {
      0% { opacity: 0; transform: scale(.88); filter: blur(1px); }
      45% { opacity: .5; transform: scale(.98); filter: blur(.4px); }
      100% { opacity: 1; transform: scale(var(--zoom)); filter: blur(0); }
    }

    .app.opening .closed-cover {
      transform: rotateY(178deg) translateX(2.5%) translateZ(18px);
      filter: brightness(.92);
    }

    .app.opening .closed-book {
      opacity: 0;
      visibility: hidden;
      transition-delay: 1040ms;
    }

    .app.opened .closed-book {
      display: none;
    }

    @media (max-width: 980px) {
      .book-scale { width: 99.6vw; min-width: 0; }
      .closed-cover-wrap, .closed-book::before { width: min(78vw, calc((100vh - 62px) * .68)); min-width: min(320px, 82vw); }
      .controls { grid-template-columns: auto auto 1fr auto; }
      .fullscreen-btn { display: none; }
    }

    @media (max-width: 720px) {
      .app { padding: .08rem .12rem .16rem; }
      .topbar { justify-content: center; }
      .brand { justify-content: center; text-align: center; }
      .brand h1 { font-size: 1rem; }
      .brand span { font-size: .72rem; }
      .reader { align-items: start; }
      .book-scale { width: 99.6vw; margin-top: 0; }
      .nav-btn { top: auto; bottom: 4.2rem; transform: none; width: 42px; height: 42px; }
      .nav-btn:hover, .nav-btn:active { transform: none; }
      .controls {
        width: calc(100vw - .2rem);
        grid-template-columns: auto auto 1fr auto;
        gap: .35rem;
        padding: .42rem .42rem;
      }
      .control-btn { padding: .42rem .66rem; }
      .counter { min-width: 96px; font-size: .92rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      :root { --turn-time: 1ms; }
      *, *::before, *::after { animation-duration: 1ms !important; transition-duration: 1ms !important; scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading" aria-hidden="true">
    <div class="loading-dot"></div>
  </div>

  <div class="app closed" id="app">
    <header class="topbar">
      <div class="brand">
        <h1>مجلة أهل الدار</h1>
        <span>نبض واحد رؤية واحدة</span>
      </div>
    </header>

    <main class="reader" aria-label="Arabic flipbook reader">
      <button class="closed-book" id="closedBook" type="button" aria-label="Open book">
        <span class="closed-cover-wrap">
          <span class="closed-cover"><img src="assets/pages/page-001.png" alt="مجلة أهل الدار cover" /></span>
          <span class="closed-book-hint">انقر لفتح الكتاب</span>
        </span>
      </button>
      <button class="nav-btn nav-prev" id="prevBtn" type="button" aria-label="Previous spread" title="Previous spread">›</button>
      <div class="book-scale" id="bookScale">
        <section class="book-frame" id="bookFrame">
          <div class="book-shadow"></div>

          <div class="page page-left" id="leftPage"><img id="leftImg" alt="Left page" /></div>
          <div class="page page-right" id="rightPage"><img id="rightImg" alt="Right page" /></div>

          <div class="turn-sheet" id="turnSheet" aria-hidden="true">
            <div class="turn-face front"><img id="turnFrontImg" alt="Turning page front" /></div>
            <div class="turn-face back"><img id="turnBackImg" alt="Turning page back" /></div>
          </div>

          <button class="hotspot next" id="nextHotspot" aria-label="Next spread" type="button"></button>
          <button class="hotspot prev" id="prevHotspot" aria-label="Previous spread" type="button"></button>
        </section>
      </div>
      <button class="nav-btn nav-next" id="nextBtn" type="button" aria-label="Next spread" title="Next spread">‹</button>
    </main>

    <footer class="controls">
      <button class="control-btn" id="zoomOutBtn" type="button" aria-label="Zoom out">−</button>
      <button class="control-btn" id="zoomInBtn" type="button" aria-label="Zoom in">＋</button>
      <button class="control-btn fullscreen-btn" id="fullscreenBtn" type="button">Fullscreen</button>
      <div class="progress">
        <div class="progress-track" id="progressTrack" role="slider" aria-label="Page progress" aria-valuemin="1" aria-valuemax="32" aria-valuenow="1" tabindex="0">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>
      <div class="counter" id="counter">1–2 / 32</div>
    </footer>
  </div>

  <script>
    const TOTAL_PAGES = 32;
    const TOTAL_SPREADS = Math.ceil(TOTAL_PAGES / 2);
    const PAGE_PATH = n => `assets/pages/page-${String(n).padStart(3, '0')}.png`;
    const TURN_MS = 1340;

    const loading = document.getElementById('loading');
    const leftImg = document.getElementById('leftImg');
    const rightImg = document.getElementById('rightImg');
    const turnSheet = document.getElementById('turnSheet');
    const turnFrontImg = document.getElementById('turnFrontImg');
    const turnBackImg = document.getElementById('turnBackImg');
    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextHotspot = document.getElementById('nextHotspot');
    const prevHotspot = document.getElementById('prevHotspot');
    const progressTrack = document.getElementById('progressTrack');
    const progressBar = document.getElementById('progressBar');
    const counter = document.getElementById('counter');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const zoomInBtn = document.getElementById('zoomInBtn');
    const zoomOutBtn = document.getElementById('zoomOutBtn');
    const root = document.documentElement;
    const app = document.getElementById('app');
    const closedBook = document.getElementById('closedBook');

    let currentSpread = 1;
    let animating = false;
    let zoom = 1.14;
    let bookOpen = false;


    function openBook() {
      if (bookOpen || app.classList.contains('opening')) return;
      app.classList.remove('closed');
      app.classList.add('opening');
      window.setTimeout(() => {
        bookOpen = true;
        app.classList.remove('opening');
        app.classList.add('opened');
        updateUI();
      }, 1480);
    }

    function pagePair(spreadIndex) {
      return {
        right: Math.min(TOTAL_PAGES, spreadIndex * 2 - 1),
        left: Math.min(TOTAL_PAGES, spreadIndex * 2)
      };
    }

    function setImg(imgEl, pageNo) {
      imgEl.src = PAGE_PATH(pageNo);
      imgEl.alt = `Page ${pageNo} of مجلة أهل الدار`;
    }

    function renderSpread(spreadIndex) {
      const pages = pagePair(spreadIndex);
      setImg(rightImg, pages.right);
      setImg(leftImg, pages.left);
    }

    function pageRangeLabel(spreadIndex) {
      const start = spreadIndex * 2 - 1;
      const end = Math.min(spreadIndex * 2, TOTAL_PAGES);
      return `${start}–${end} / ${TOTAL_PAGES}`;
    }

    function progressPage(spreadIndex) {
      return spreadIndex * 2 - 1;
    }

    function updateUI() {
      counter.textContent = pageRangeLabel(currentSpread);
      const pageNo = progressPage(currentSpread);
      progressTrack.setAttribute('aria-valuenow', pageNo);
      progressBar.style.width = `${((pageNo - 1) / (TOTAL_PAGES - 1)) * 100}%`;
      prevBtn.disabled = animating || currentSpread === 1;
      nextBtn.disabled = animating || currentSpread === TOTAL_SPREADS;
    }

    function clearTurnSheet() {
      turnSheet.className = 'turn-sheet';
    }

    function goNext() {
      if (!bookOpen) { openBook(); return; }
      if (animating || currentSpread >= TOTAL_SPREADS) return;
      animating = true;
      updateUI();

      const current = pagePair(currentSpread);
      const next = pagePair(currentSpread + 1);

      // Reveal next left page beneath the turning page.
      setImg(leftImg, next.left);
      // Keep current right page visible until the turn completes.
      setImg(rightImg, current.right);

      setImg(turnFrontImg, current.left);
      setImg(turnBackImg, next.right);
      turnSheet.className = 'turn-sheet active next';

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          turnSheet.classList.add('turning');
        });
      });

      window.setTimeout(() => {
        currentSpread += 1;
        setImg(rightImg, next.right);
        clearTurnSheet();
        animating = false;
        updateUI();
      }, TURN_MS);
    }

    function goPrev() {
      if (!bookOpen) { openBook(); return; }
      if (animating || currentSpread <= 1) return;
      animating = true;
      updateUI();

      const current = pagePair(currentSpread);
      const prev = pagePair(currentSpread - 1);

      // Reveal previous right page beneath the turning page.
      setImg(rightImg, prev.right);
      // Keep current left page visible until the turn completes.
      setImg(leftImg, current.left);

      setImg(turnFrontImg, current.right);
      setImg(turnBackImg, prev.left);
      turnSheet.className = 'turn-sheet active prev';

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          turnSheet.classList.add('turning');
        });
      });

      window.setTimeout(() => {
        currentSpread -= 1;
        setImg(leftImg, prev.left);
        clearTurnSheet();
        animating = false;
        updateUI();
      }, TURN_MS);
    }

    function jumpToSpread(targetSpread) {
      if (!bookOpen) { openBook(); return; }
      const clamped = Math.max(1, Math.min(TOTAL_SPREADS, targetSpread));
      if (clamped === currentSpread || animating) return;
      currentSpread = clamped;
      clearTurnSheet();
      renderSpread(currentSpread);
      updateUI();
    }

    function spreadFromPointer(clientX) {
      const rect = progressTrack.getBoundingClientRect();
      const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
      const pageNo = Math.round(1 + ratio * (TOTAL_PAGES - 1));
      return Math.min(TOTAL_SPREADS, Math.max(1, Math.ceil(pageNo / 2)));
    }

    function applyZoom() {
      zoom = Math.max(1.0, Math.min(1.42, zoom));
      root.style.setProperty('--zoom', zoom.toFixed(2));
    }

    closedBook.addEventListener('click', openBook);
    nextBtn.addEventListener('click', goNext);
    prevBtn.addEventListener('click', goPrev);
    nextHotspot.addEventListener('click', goNext);
    prevHotspot.addEventListener('click', goPrev);

    progressTrack.addEventListener('click', e => jumpToSpread(spreadFromPointer(e.clientX)));
    progressTrack.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') { e.preventDefault(); goNext(); }
      if (e.key === 'ArrowRight') { e.preventDefault(); goPrev(); }
      if (e.key === 'Home') { e.preventDefault(); jumpToSpread(1); }
      if (e.key === 'End') { e.preventDefault(); jumpToSpread(TOTAL_SPREADS); }
    });

    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); goNext(); }
      if (e.key === 'ArrowRight' || e.key === 'PageUp') { e.preventDefault(); goPrev(); }
      if (e.key === 'Home') { e.preventDefault(); jumpToSpread(1); }
      if (e.key === 'End') { e.preventDefault(); jumpToSpread(TOTAL_SPREADS); }
      if (e.key === '+') { zoom += .06; applyZoom(); }
      if (e.key === '-') { zoom -= .06; applyZoom(); }
    });

    let touchStartX = 0;
    let touchStartY = 0;
    document.getElementById('bookFrame').addEventListener('touchstart', e => {
      if (!e.changedTouches.length) return;
      touchStartX = e.changedTouches[0].clientX;
      touchStartY = e.changedTouches[0].clientY;
    }, { passive: true });

    document.getElementById('bookFrame').addEventListener('touchend', e => {
      if (!e.changedTouches.length) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy) * 1.3) {
        if (dx < 0) goNext();
        else goPrev();
      }
    }, { passive: true });

    zoomInBtn.addEventListener('click', () => { zoom += .06; applyZoom(); });
    zoomOutBtn.addEventListener('click', () => { zoom -= .06; applyZoom(); });

    fullscreenBtn.addEventListener('click', async () => {
      if (!document.fullscreenElement) {
        try { await document.documentElement.requestFullscreen(); } catch (_) {}
      } else {
        try { await document.exitFullscreen(); } catch (_) {}
      }
    });

    window.addEventListener('load', () => {
      renderSpread(currentSpread);
      applyZoom();
      updateUI();
      window.setTimeout(() => loading.classList.add('hidden'), 250);
    });
  </script>
</body>
</html>
